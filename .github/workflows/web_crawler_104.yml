name: 104 RPA 爬蟲

on:
  schedule:
    - cron: '0 4 * * *'  # 每天台灣時間 10:00（UTC+8 → UTC 02:00）
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python .github/workflows/project-3.py
      - uses: actions/upload-artifact@v4
        with:
          name: rpa-jobs
          path: "*.csv"  # 自動保存爬取結果
